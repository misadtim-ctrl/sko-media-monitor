name: Monitor republican media

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-main
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore bounded technical state
        uses: actions/cache@v4
        with:
          path: data
          key: sko-main-state-${{ github.run_id }}
          restore-keys: |
            sko-main-state-

      - name: Cache local semantic model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: sko-semantic-${{ runner.os }}-v1

      - name: Install free local analyzer
        run: pip install '.[semantic]'

      - name: Run main monitoring
        env:
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          MONITOR_WEBHOOK_SECRET: ${{ secrets.MONITOR_WEBHOOK_SECRET }}
          ENABLE_SEMANTIC: "true"
          ENABLE_DELIVERY: "true"
          SOURCE_REGISTRY: config/sources.json
          STATE_DB: data/state.sqlite3
          EXPORT_DIR: exports
        run: sko-monitor run --mode main --lookback-hours 72

      - name: Keep only the latest export for diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-main-results
          path: exports/latest.*
          if-no-files-found: ignore
          retention-days: 1
