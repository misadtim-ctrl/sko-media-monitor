name: Monitor city complaints

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-negative
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore bounded technical state
        uses: actions/cache@v4
        with:
          path: data
          key: sko-negative-state-${{ github.run_id }}
          restore-keys: |
            sko-negative-state-

      - name: Cache local semantic and speech models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: sko-local-models-${{ runner.os }}-v1

      - name: Install OCR and free analyzers
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr tesseract-ocr-rus tesseract-ocr-kaz
          pip install '.[instagram,semantic,media]'

      - name: Restore reusable Instagram session
        env:
          INSTAGRAM_SESSION_B64: ${{ secrets.INSTAGRAM_SESSION_B64 }}
        run: |
          mkdir -p data
          if [ -n "$INSTAGRAM_SESSION_B64" ]; then
            printf '%s' "$INSTAGRAM_SESSION_B64" | base64 --decode > data/instagram-session
            chmod 600 data/instagram-session
          fi

      - name: Run complaint monitoring
        env:
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          MONITOR_WEBHOOK_SECRET: ${{ secrets.MONITOR_WEBHOOK_SECRET }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_SESSION_FILE: data/instagram-session
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION || 'v22.0' }}
          ENABLE_SEMANTIC: "true"
          ENABLE_DELIVERY: "false"
          ENABLE_MEDIA_ANALYSIS: "true"
          ENABLE_VIDEO_ANALYSIS: "false"
          SOURCE_REGISTRY: config/sources.json
          STATE_DB: data/shadow-negative.sqlite3
          EXPORT_DIR: exports
        run: sko-monitor run --mode negative --lookback-hours 72

      - name: Keep only the latest export for diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-negative-results
          path: exports/latest.*
          if-no-files-found: ignore
          retention-days: 1
