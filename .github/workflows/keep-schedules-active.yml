name: Keep scheduled monitoring active

on:
  schedule:
    - cron: "23 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record repository activity
        run: |
          date -u +'%Y-%m-%dT%H:%M:%SZ' > .github/schedule-keepalive.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/schedule-keepalive.txt
          git commit -m 'chore: keep monitoring schedules active'
          git push
